const DEEP_DIVES_DATA = {
  'anatomy-of-a-breach': {
    index: '01',
    title: 'Anatomy of a Breach: A Real Incident, Hour by Hour',
    subtitle: 'A composited, anonymized ransomware incident, walked from the first phishing click to full containment — with the decisions that mattered at every hour.',
    readTime: 13,
    domains: ['Domain 1 — Foundations', 'Domain 2 — Detection & Response', 'Domain 4 — Practical Defense & Career'],
    takeaways: [
      'The breach didn’t start with a sophisticated exploit — it started with one convincing email and a login page that looked correct.',
      'MFA that exists on paper isn’t the same as MFA that resists phishing — SMS and push-based factors were defeated within hours.',
      'The attacker spent longer being quiet than being loud — nine hours of reconnaissance produced zero alerts before lateral movement began.',
      'Backups were technically in place, but network-accessible backups are just another asset for ransomware to encrypt.',
      'Every control that would have shortened this timeline already existed as a checklist item — the gap was between "documented" and "actually effective."',
    ],
    blocks: [
      { type: 'p', text: 'This is not one incident. It’s a composite, built from patterns that show up again and again across ransomware cases — the kind an IT pro at a mid-size company is statistically far more likely to face than the exotic nation-state intrusion that dominates headlines. Names, dates, and identifying details are invented. The sequence of decisions, the timing, and the mistakes are not — they’re what actually happens, over and over, at companies that never expected to be the story.' },
      { type: 'p', text: 'The reason to walk through it hour by hour instead of summarizing it in a paragraph is simple: frameworks tell you what should happen. Timelines tell you what does happen, including the parts where nothing happens for hours at a stretch, where a real person made a reasonable-sounding call that turned out to be wrong, and where the fix that would have stopped it cost less than the incident response retainer that came after.' },
      { type: 'h3', text: 'The Setup' },
      { type: 'p', text: 'The company is a 340-person manufacturing and logistics firm — an IT department of six, a security budget that mostly buys antivirus and a firewall renewal, and a leadership team that has heard of ransomware but assumes it happens to hospitals and pipelines, not them. They run mostly on-prem infrastructure with a growing set of cloud tools bolted on over the last three years: a cloud ERP system, Microsoft 365, and a handful of SaaS apps nobody in IT formally approved. Sound familiar? It should — this is the median target, not the outlier.' },
      { type: 'p', text: 'They have MFA. It’s enabled on the accounts that matter, technically. It’s SMS-based for most users and push-notification-based for the IT team, because that was the default the vendor shipped and nobody revisited it. They have backups, running nightly to a network-attached storage device that every domain-joined server can see. They have an EDR agent installed on most endpoints, in a default configuration nobody has tuned since the trial period ended eighteen months ago. Every one of these facts will matter later.' },
      { type: 'h3', text: 'Hour 0 — The Click' },
      { type: 'p', text: 'It starts on a Tuesday morning with an email to the accounts payable coordinator, spoofed to look like a past-due invoice notice from a logistics vendor the company actually uses. The email isn’t sloppy. It references a real vendor name, uses a domain one character off from the legitimate one, and links to a page that looks exactly like the company’s Microsoft 365 login — because it is a phishing kit built specifically to proxy that login in real time.' },
      { type: 'p', text: 'The coordinator enters her username and password. The page, functioning as a reverse proxy, passes those credentials straight through to the real Microsoft login and receives the resulting MFA push prompt, which it relays back to her phone in the same instant. She approves it — it looks identical to the fifteen other prompts she’s approved this month for legitimate logins, because from her device’s perspective, it is one. The attacker now holds a valid, authenticated session token. MFA didn’t fail because it was disabled. It failed because it was a form MFA that a real-time phishing proxy could simply relay through.' },
      { type: 'h3', text: 'Hour 3 — Quiet Reconnaissance' },
      { type: 'p', text: 'For nearly three hours, nothing visibly happens. This is deliberate, and it’s the phase most tabletop exercises skip entirely because it isn’t dramatic. The attacker is inside the coordinator’s mailbox and OneDrive, reading — not acting. They’re looking for how IT communicates internally, what tools show up in shared files, whether there’s a password manager export sitting in a folder somewhere, and who has admin rights based on group names and email threads.' },
      { type: 'p', text: 'They find an IT ticketing system login referenced in an old email thread, plus a spreadsheet — three years stale, never deleted — listing service account names and their purposes, though not their passwords. That’s enough. They now know the shape of the environment without having touched a single server, and nothing in the security stack has fired because nothing they’ve done yet looks different from a user reading her own email.' },
      { type: 'h3', text: 'Hour 9 — Credential Theft' },
      { type: 'p', text: 'The attacker uses the stolen session to register a new, attacker-controlled device as a trusted MFA method on the coordinator’s account — a step many organizations don’t restrict, and this one doesn’t. That gives them durable access independent of the original phishing session, which might otherwise expire. From there they pivot to a low-friction step: a password-spray attempt against the service accounts named in that stale spreadsheet, using common seasonal patterns. One hits — a monitoring service account with a password last rotated during initial setup two years earlier, and local admin rights on a subset of servers because it was easier to grant broad access once than to scope it properly.' },
      { type: 'p', text: 'With that account, they run a credential-dumping tool against one of the servers it can reach — a routine, well-documented technique that extracts cached credentials from memory. Among them: a domain admin account that logged into that box for a one-time maintenance task eight months earlier and was never cleaned from its cache. The EDR agent on that server flags the dumping tool as "suspicious" and logs an alert. No one is looking at the console at 6:40 in the morning. It sits, unread, for eleven hours.' },
      { type: 'quote', text: 'The alert that would have stopped this at hour nine didn’t fail to fire. It fired, correctly, into a queue nobody was watching.' },
      { type: 'h3', text: 'Hour 15 — Domain Admin' },
      { type: 'p', text: 'By mid-afternoon, the attacker authenticates as domain admin. This is the hour that matters more than any other in the entire timeline, because it’s the moment the incident stops being "an account is compromised" and becomes "the entire environment is compromised." From here, they can reach every server, every share, every backup target, and every security tool with the authority to reconfigure or disable it.' },
      { type: 'p', text: 'They move first to disable or uninstall the EDR agent across the servers they can reach, using the same administrative access the security team would use to manage it. Then they quietly add a new domain admin account of their own — a fallback in case the original compromised account gets noticed and disabled. Nothing about this generates a phone call or a page. It generates log entries, in a SIEM that ingests logs but has no alert rule configured for "new domain admin account created outside change-management hours," because building that rule was on a backlog nobody got to.' },
      { type: 'h3', text: 'Hour 26 — Staging the Exit' },
      { type: 'p', text: 'Overnight, the attacker stages data for exfiltration — a standard step in modern "double extortion" ransomware, where the threat isn’t just encryption but publication of stolen data if the ransom isn’t paid. They target file shares with the most obviously sensitive names: HR, Finance, Contracts. Roughly 40 gigabytes moves out over several hours, disguised as routine cloud backup traffic to an unfamiliar destination — traffic that would have stood out to anyone reviewing outbound flows, except no one was.' },
      { type: 'p', text: 'They also locate the NAS device holding nightly backups. Because it’s reachable over the same network as every domain-joined server, and because the backup software account has domain-level write access to make its job easier, the attacker adds it to the target list for what comes next. This single architectural shortcut — backups reachable from the same trust zone as everything else — will turn a bad day into a catastrophic one.' },
      { type: 'h3', text: 'Hour 34 — Detonation' },
      { type: 'p', text: 'Just after midnight on Thursday, the ransomware payload deploys across every server and workstation the attacker’s domain admin access can reach — including the NAS. Encryption is fast and loud by design; unlike the previous thirty-four hours, this phase wants to be noticed, because the business now needs to know it has a decision to make. Ransom notes appear on every affected desktop. The ERP system goes unreachable. Printers on the shop floor start spitting out the ransom note instead of shipping labels — a deliberate, theatrical touch some ransomware operators use to maximize panic.' },
      { type: 'p', text: 'By 6 a.m., the help desk has forty tickets, three department heads on the phone, and one IT admin trying to figure out whether this is a single server issue or something bigger, without yet knowing the backups are also gone.' },
      { type: 'h3', text: 'Hour 35 — The First Decisions' },
      { type: 'p', text: 'This is the hour that separates companies that recover in days from companies that recover in months, and none of it is technical — it’s organizational. Does anyone know who has the authority to disconnect the network from the internet without a VP’s sign-off? Is there a phone number for a incident response retainer, or is someone now Googling "ransomware help" at 6:15 in the morning? Does legal need to be looped in before or after containment starts, given breach notification obligations that are now running on a clock whether anyone acknowledges it or not?' },
      { type: 'p', text: 'In this case, the answer to the first question is "eventually" — it takes ninety minutes and three escalating phone calls to get authorization to isolate affected segments, because the person with that authority is not reachable and no one else feels empowered to act without them. Those ninety minutes matter less for containing this specific attack, which has already run its course, and more as a preview of every future incident this company will face until that gap gets fixed.' },
      { type: 'h3', text: 'Hour 48 — Containment' },
      { type: 'p', text: 'By the two-day mark, an external incident response firm is engaged, affected network segments are isolated, the remaining domain admin accounts are rotated, and the attacker’s persistence mechanisms — including that quietly created fallback admin account — are identified and removed. This is also when the company discovers, in full, what the attacker already knew: the nightly backups on the NAS were encrypted along with everything else, because nothing separated them from the blast radius.' },
      { type: 'p', text: 'There is a second, smaller backup — a weekly export a departing IT admin had set up eighteen months earlier to an offsite cloud bucket, undocumented and nearly forgotten. It’s stale, but it exists, and it’s untouched because the attacker never found it. It becomes the actual recovery point, not the nightly backup everyone assumed would be there.' },
      { type: 'h3', text: 'Day 5 — Recovery' },
      { type: 'p', text: 'Recovery stretches across the following week: rebuilding servers from clean images, restoring what can be restored from the stale offsite backup, manually reconstructing the gap between that backup and the day of the attack from whatever records exist elsewhere, and validating that no persistence mechanism survived the cleanup. The ERP system is back in a limited capacity by day four. Full normal operations return around day nine.' },
      { type: 'h3', text: 'The Ransom Question' },
      { type: 'p', text: 'Running in parallel to the technical recovery is a decision nobody at this company has ever had to make before: whether to engage with the attacker’s extortion demand at all. Because the ransomware operators exfiltrated data before encrypting anything, decryption isn’t really the point — the company’s own backup, however stale, gets most systems running again without paying anyone. The leverage the attacker actually holds is the threat to publish HR, finance, and contract data on a leak site if the ransom isn’t paid, and that’s a fundamentally different negotiation than "pay us and get your files back."' },
      { type: 'p', text: 'This is where the incident response retainer, cyber insurance carrier, and outside legal counsel earn their cost many times over. They bring a ransomware negotiator with experience reading whether a specific criminal group has a track record of actually deleting data after payment, versus reselling it regardless. They help translate an unfamiliar decision — send cryptocurrency to an anonymous criminal enterprise — into a structured risk calculation involving regulatory exposure, contractual obligations to affected customers, and the plain, uncomfortable math of reputational cost against payment cost. There’s no universally right answer here, and any piece claiming otherwise is selling something. What matters is that this decision gets made deliberately, with expert input, instead of being improvised by a panicked executive team at midnight.' },
      { type: 'p', text: 'In this case, after eleven days of back-and-forth involving the negotiator and legal counsel, the company pays a reduced settlement covered in part by its cyber insurance policy — a policy that exists specifically because a board member had pushed for it eighteen months earlier, over some initial resistance about the added expense. That single earlier decision, unrelated to any technical control, ends up shaping the entire financial outcome of the incident more than almost anything else in this timeline.' },
      { type: 'h3', text: 'What Would Have Changed the Timeline' },
      { type: 'p', text: 'None of the individual failures here are exotic. Phishing-resistant MFA — a hardware key or platform passkey instead of SMS or push notifications — would have made the hour-zero compromise significantly harder, because there’s no prompt for a human to approve and no session for a proxy to relay. Restricting who can register new MFA methods on an account would have closed the durable-access step at hour nine. A SIEM alert rule for new domain admin accounts, and someone actually watching EDR alerts outside business hours, would have caught this before hour fifteen — before the entire environment was in scope.' },
      { type: 'p', text: 'And backups reachable only from an isolated, one-way trust zone — the kind an attacker with full domain admin still can’t reach — would have turned "recovery took nine days and involved a nearly-forgotten offsite export" into "recovery took one day from a backup that was never at risk." Every one of these is a known, well-documented practice. None of them required a bigger budget than what this company was already spending — they required revisiting defaults that were set once, years ago, and never looked at again.' },
      { type: 'h3', text: 'The Uncomfortable Truth' },
      { type: 'p', text: 'The most unsettling part of this timeline isn’t any single technical failure — it’s how defensible every decision looked in isolation, at the time it was made. Enabling MFA felt like doing the right thing, even though the form of MFA mattered enormously. Buying an EDR product felt like coverage, even though nobody tuned the alerting after the trial period. Setting up nightly backups felt like resilience, even though network placement made them just another target.' },
      { type: 'p', text: 'This is the pattern worth sitting with, more than the specific timeline: security failures at companies like this one are rarely a single dramatic gap. They’re a series of individually reasonable-sounding decisions, made at different times by different people, none of whom saw the whole chain they were building. The fix isn’t a bigger tool. It’s treating every one of those "we have that covered" boxes as a claim to periodically re-verify, not a checkbox to tick once and trust forever.' },
      { type: 'p', text: 'By the time the final invoice from the incident response firm arrives, alongside legal fees, the reduced ransom settlement, nine days of lost production capacity, and the cost of the security improvements made in the aftermath, the total lands well into seven figures — for a company whose entire annual security budget, before the incident, was a rounding error by comparison. None of the fixes that would have prevented this cost anywhere close to that. That gap, more than any single technical detail in this timeline, is the argument worth bringing back to leadership the next time a modest security investment gets deferred to "next quarter."' },
    ],
  },
  'modern-attack-surface': {
    index: '02',
    title: 'The Modern Attack Surface: A Field Map',
    subtitle: 'Identity, endpoints, cloud, SaaS, APIs, and containers mapped as one connected terrain — a reference worth bookmarking, not just reading once.',
    readTime: 10,
    domains: ['Domain 1 — Foundations', 'Domain 3 — Cloud & Modern Surface', 'Domain 4 — Practical Defense & Career'],
    takeaways: [
      'The surfaces mapped here — identity, endpoints, cloud infrastructure, SaaS, APIs, containers, third-party vendor access, and the data itself — are not separate battles. A single stolen token can carry an attacker across most of them at once.',
      'Identity is the connective tissue between every other surface — it’s worth defending first because a compromise there unlocks the rest.',
      'Shadow IT and unsanctioned SaaS apps expand your attack surface even when your "official" security posture looks strong on paper.',
      'APIs and containers are the newest terrain and the least mature in most organizations’ defenses — attackers know this and go there first when identity is well-defended.',
      'This map is worth revisiting whenever you add a vendor, a tool, or a cloud service — the terrain changes every time you do.',
    ],
    blocks: [
      { type: 'p', text: 'Ten years ago, "attack surface" mostly meant a network diagram: a firewall, a DMZ, a handful of servers behind it, and a clear inside-versus-outside line. That map is close to useless now. The modern attack surface isn’t a diagram of network segments — it’s a web of trust relationships between identities, devices, cloud services, SaaS apps, APIs, and containers, and an attacker who compromises any single node can often walk into several of the others.' },
      { type: 'p', text: 'This piece is meant to be a reference more than a narrative — something you come back to when you’re trying to reason about a new vendor, a new integration, or "wait, what actually touches what" in your environment. Eight terrains, how they connect, and where attackers actually go when they land in each one.' },
      { type: 'h3', text: 'Identity — The Terrain Everything Else Sits On' },
      { type: 'p', text: 'Identity isn’t one terrain among the rest. It’s the terrain the others are built on top of, because almost every access decision in a modern environment ultimately reduces to "is this the right person, authenticated the right way." A compromised identity doesn’t just get an attacker into email — depending on what that identity can reach, it can be the master key to cloud infrastructure, SaaS admin panels, API credentials, and container orchestration consoles, all without the attacker touching a single traditional network boundary.' },
      { type: 'p', text: 'The attack patterns here are well known and still devastatingly effective: phishing that proxies MFA in real time, MFA fatigue attacks that spam push notifications until someone approves one out of frustration, and session token theft that skips authentication entirely by stealing an already-authenticated session. What to watch: which identities have standing access to sensitive systems versus access granted just-in-time, whether MFA is phishing-resistant or just phishing-annoying, and how quickly a compromised credential can be revoked across every system it touches — not just the one where it was noticed.' },
      { type: 'h3', text: 'Endpoints — Still the Most Common Landing Zone' },
      { type: 'p', text: 'Laptops and desktops remain the most common place an attacker first lands, mostly because they’re where humans click things. What’s changed isn’t that endpoints stopped mattering — it’s that they stopped being the whole story. An endpoint compromise used to mean "the attacker is inside our network." Now it often means "the attacker has whatever cached credentials, browser sessions, and cloud tokens happened to be sitting on that one laptop" — which, for a remote employee with SaaS tabs open and a cloud CLI configured, can be a great deal more than the endpoint itself.' },
      { type: 'p', text: 'This is why EDR — endpoint detection and response — has become table stakes rather than a nice-to-have, and why the difference between "having EDR" and "having EDR that’s tuned and actually monitored" is the entire ballgame, as the ransomware timeline in this series’ companion piece makes painfully clear. What to watch: whether endpoints are treated as disposable and reimageable versus precious and hand-nursed back to health, and whether local admin rights are the default or the exception.' },
      { type: 'h3', text: 'Cloud Infrastructure — Misconfiguration Over Malware' },
      { type: 'p', text: 'In cloud environments — AWS, Azure, GCP — the dominant risk isn’t exotic malware, it’s misconfiguration: a storage bucket left public, an identity role with far broader permissions than the workload actually needs, a security group open to the entire internet because it was faster to test that way and nobody closed it back down afterward. Cloud platforms give you enormous power to configure access precisely — and just as much power to misconfigure it into something wide open, often with no obvious symptom until someone finds it.' },
      { type: 'p', text: 'The attacker playbook here is patient and automated: scanners constantly sweep the internet for exposed storage and misconfigured services, and once inside via a stolen credential, attackers routinely enumerate IAM permissions looking for the one over-provisioned role that lets them pivot further than intended. What to watch: whether permissions follow least-privilege by default or get broadened "temporarily" and never revisited, and whether anyone is running continuous configuration audits rather than a one-time assessment from two years ago.' },
      { type: 'h3', text: 'SaaS — The Sprawl Nobody Approved' },
      { type: 'p', text: 'The average mid-size company runs dramatically more SaaS applications than IT has formally approved — marketing signs up for a new analytics tool, sales starts using a scheduling app, someone in finance connects a spreadsheet automation service to the company’s cloud storage. Each one is a new place where company data lives, a new set of credentials to compromise, and a new OAuth integration with permissions that were granted with a single click and never reviewed again.' },
      { type: 'quote', text: 'Shadow IT isn’t a policy failure so much as a visibility failure — you can’t secure what you don’t know exists.' },
      { type: 'p', text: 'The attack pattern that’s grown fastest here isn’t stealing a SaaS password directly — it’s OAuth phishing, where a user is tricked into granting a malicious app permission to read their email or files, no password required at all, and no MFA prompt to defeat because the user handed over access willingly, believing the app to be legitimate. What to watch: whether you have any inventory of connected OAuth apps at all, and whether anyone periodically reviews and revokes the ones nobody remembers authorizing.' },
      { type: 'h3', text: 'APIs — Built to Be Reached, Rarely Built to Be Defended' },
      { type: 'p', text: 'APIs are the connective infrastructure behind nearly every modern app and integration, and they’re disproportionately under-defended relative to how much they’re relied on. The most common real-world failure isn’t a sophisticated exploit — it’s broken authorization, where an API correctly checks that a request is authenticated but fails to check that the authenticated user should actually have access to the specific record being requested, letting one customer pull another customer’s data just by changing an ID number in the request.' },
      { type: 'p', text: 'For an IT pro who isn’t a developer, the relevant question isn’t "how do I secure our API code" — that’s an engineering problem — it’s "do we even have an inventory of what APIs exist, what they expose, and who can reach them," because a shocking number of organizations discover forgotten or undocumented API endpoints only when a scanner — theirs or an attacker’s — finds one still running from a project that was supposedly decommissioned. What to watch: whether API keys are treated with the same seriousness as passwords, given how often they’re accidentally committed to code repositories or left in client-side JavaScript where anyone can read them.' },
      { type: 'h3', text: 'Containers & Kubernetes — Fast-Moving Terrain, Slow-Moving Defenses' },
      { type: 'p', text: 'Containerized infrastructure lets teams ship software faster, but it also introduces an entirely new layer of things that can be misconfigured: container images pulled from public registries without verification, containers running with far more privilege than their workload needs, and Kubernetes clusters with dashboards or APIs exposed to the internet because a "quick test setup" never got locked down before it became permanent.' },
      { type: 'p', text: 'The realistic attack pattern for most organizations isn’t a nation-state-grade container escape — it’s something much simpler: a vulnerable, outdated base image with a known CVE, pulled into production because nobody’s scanning images before deployment, or a misconfigured cluster API left open to the internet that gets discovered by the same kind of automated scanner that finds public storage buckets. What to watch: whether images are scanned before deployment, whether containers run as root by default, and whether anyone outside the engineering team even knows the cluster exists.' },
      { type: 'h3', text: 'Third-Party & Vendor Access — The Terrain You Don’t Control' },
      { type: 'p', text: 'Every vendor, contractor, and managed service provider with access to your systems extends your attack surface into an environment you don’t operate and can’t directly secure — and attackers know that targeting a smaller, less-defended vendor is often an easier path into a well-defended primary target than attacking it directly. This is how a single compromised HVAC contractor, a compromised IT managed service provider, or a compromised software update mechanism can turn into a breach at every one of that vendor’s downstream customers simultaneously.' },
      { type: 'p', text: 'The practical failure here is rarely dramatic — it’s a vendor with a remote access tool installed on your network for support purposes, using a shared password across all their clients, or a vendor whose own security posture nobody at your company ever asked about before granting access. What to watch: whether vendor access is scoped to exactly what’s needed and revoked when a project ends, whether any vendor holds standing credentials into your environment instead of just-in-time access, and whether you’ve ever actually asked a critical vendor what their own security practices look like before trusting them with a door into yours.' },
      { type: 'h3', text: 'Data — The Terrain Everyone Forgets to Map' },
      { type: 'p', text: 'Every terrain covered so far is really a route to the same destination: data. It’s easy to spend so much energy mapping identities, endpoints, cloud accounts, SaaS apps, APIs, containers, and vendors that the actual question — where does our sensitive data physically live, in how many copies, across how many of these terrains at once — never gets asked directly. A single customer record can legitimately exist in the production database, a SaaS customer support tool, an analytics platform, a backup, a developer’s local test environment, and an export sitting in someone’s downloads folder from a report they ran eight months ago.' },
      { type: 'p', text: 'That sprawl means the "attack surface" for any given piece of sensitive data isn’t just the system you consider its official home — it’s every terrain any copy of it has ever touched, most of which nobody is actively defending because nobody remembers it’s there. What to watch: whether you have even a rough answer to "where does our most sensitive data live, in every copy," whether data retention policies actually get enforced or just get written, and whether access to that data is reviewed as carefully wherever it lives as it is in the system everyone thinks of as primary.' },
      { type: 'h3', text: 'How These Terrains Actually Connect' },
      { type: 'p', text: 'The reason this map matters more as a whole than as separate sections is that real attacks rarely stay inside one terrain. A phishing email compromises an identity. That identity’s cached session grants access to a SaaS admin panel. The SaaS admin panel has an integration with cloud storage, whose service account credentials are sitting in a configuration file. Those credentials grant access to a Kubernetes cluster, where an environment variable holds an API key for a third-party payment processor. What started as one clicked link ends four terrains later, in a place nobody would have guessed when they were designing defenses around "the network."' },
      { type: 'p', text: 'This is also why identity sits at the center of the map rather than as one item among the rest: an attacker who compromises the right identity doesn’t need to separately attack endpoints, cloud, SaaS, APIs, and containers — they inherit whatever that identity was already trusted to reach. Defending identity well, with phishing-resistant MFA and tightly scoped, monitored access, is disproportionately effective precisely because it’s the connective tissue between every other terrain on this map.' },
      { type: 'h3', text: 'Using This Map' },
      { type: 'p', text: 'The practical exercise worth doing with this piece isn’t reading it once — it’s pulling it back out the next time your organization adds a vendor, spins up a new cloud service, or approves a SaaS integration, and asking which of these terrains just expanded, and what new trust relationship just got created between it and everything else. Attack surface isn’t static, and the map you drew last year is already out of date the moment someone in marketing connects a new app to the company Google Workspace account.' },
      { type: 'p', text: 'None of these terrains is more important in the abstract than the others — what matters is whether you actually know they exist in your environment, who owns securing each one, and how they connect to each other. Most breaches don’t happen because a defender didn’t know about a specific technique. They happen because nobody was looking at the connections between terrains until an attacker already had.' },
    ],
  },
  'why-programs-still-get-breached': {
    index: '03',
    title: 'Why Good Security Programs Still Get Breached',
    subtitle: 'Alert fatigue, compliance theater, and the gap between having a policy and people actually following it.',
    readTime: 10,
    domains: ['Domain 5 — The Human Element', 'Domain 6 — Compliance & Governance'],
    takeaways: [
      'A well-resourced security program can still get breached because the failure modes here are organizational, not technical — noise, theater, and culture, not missing tools.',
      'A half-deployed security tool is worse than no tool at all — it manufactures false confidence in coverage that doesn’t actually exist.',
      'Alert fatigue isn’t a staffing problem you fix by hiring more analysts — it’s a tuning problem, and more untuned alerts just means more fatigue faster.',
      'Passing an audit and being secure are related but different things — compliance measures whether controls are documented, not whether they work under pressure.',
      'Punitive security cultures teach employees to hide mistakes and route around security, which produces worse outcomes than the mistakes themselves.',
      'The fix in every section here is the same shape: fewer, better-trusted signals instead of more, unverified ones — in tooling, in audits, and in how people are treated.',
    ],
    blocks: [
      { type: 'p', text: 'Here’s the pattern that should worry you more than any individual vulnerability: plenty of companies that get breached had a real security budget, a named CISO or security lead, a SIEM, an EDR platform, a compliance certification on the wall, and a written incident response policy. None of that prevented the breach. In some of the worst cases, it arguably contributed to it — because having the artifacts of a security program can create a false sense that the program is actually working.' },
      { type: 'p', text: 'This piece is about the failure modes that live underneath good-looking security programs — the ones that don’t show up on a maturity assessment because they’re not about whether a control exists. They’re about whether it functions the way everyone assumes it does, under real conditions, with real humans operating it.' },
      { type: 'h3', text: 'Alert Fatigue: The Slow Poison' },
      { type: 'p', text: 'Every security tool a company deploys generates alerts, and the natural instinct when evaluating a tool is to ask whether it catches enough. The question that gets asked far less often, and matters just as much: does it generate so much noise that the real signal drowns? A SIEM configured with default, out-of-the-box rules can easily produce hundreds or thousands of low-fidelity alerts a day for an environment of even modest size — most of them benign, misconfigured, or simply not worth a human’s attention.' },
      { type: 'p', text: 'The predictable human response to that volume isn’t heroic vigilance. It’s triage fatigue, then habituation, then — inevitably — a queue that gets glanced at rather than genuinely reviewed. This is exactly the failure mode from the ransomware timeline elsewhere in this series: an EDR alert fired correctly, the moment a credential-dumping tool executed, and sat unread for eleven hours because it landed in a queue full of noise indistinguishable from every other alert that turned out to be nothing.' },
      { type: 'quote', text: 'An alert that fires correctly into an ignored queue provides exactly the same protection as no alert at all.' },
      { type: 'p', text: 'The fix isn’t more alerts or a bigger analyst team to read them — both make the problem worse before they make it better. It’s aggressive, ongoing tuning: turning off rules that never produce true positives, raising thresholds on noisy ones, and treating "how many of our last hundred alerts were actually actionable" as a metric worth tracking, not just "how many alerts did we generate." A security team drowning in low-value signal isn’t more secure than a smaller team watching a shorter, trustworthy list — it’s usually less.' },
      { type: 'h3', text: 'Security Debt: The Tool You Bought and Never Finished Deploying' },
      { type: 'p', text: 'Walk the procurement history of almost any mid-size company’s security stack and you’ll find at least one product — sometimes several — purchased with real urgency after an audit finding or a scare, rolled out to maybe sixty percent of the environment during the initial push, and then quietly left there while the person who championed it moved teams or the next fire took priority. On paper, in the vendor list and the board deck, the company "has" that control. In practice, it’s protecting well under two-thirds of what it was bought to protect, and nobody has recently checked which two-thirds.' },
      { type: 'p', text: 'This is security shelf-ware, and it’s a distinct failure mode from simply not having a tool at all — arguably worse, because it manufactures false confidence. A company with no EDR knows it has a gap. A company with EDR deployed to sixty percent of endpoints, and no dashboard showing which sixty percent, believes it’s covered right up until an attacker lands on one of the unprotected machines, which is exactly what happened to the monitoring service account server in this series’ breach timeline, running an EDR agent nobody had verified was actually functioning the way its default configuration promised.' },
      { type: 'p', text: 'The fix is unglamorous and cheap relative to the tool’s original price tag: a recurring line item, not a one-time project, to verify deployment coverage against your actual asset inventory, confirm agents are reporting and not silently failing, and either finish the rollout or formally decide the tool isn’t worth finishing and retire it. A half-deployed tool costs you the license fee and gives you a false sense of coverage — that’s a worse trade than either fully deploying it or not buying it at all.' },
      { type: 'h3', text: 'Compliance Theater: Passing the Audit, Missing the Point' },
      { type: 'p', text: 'Compliance frameworks — SOC 2, ISO 27001, HIPAA, PCI DSS, and the rest — exist for good reasons, and passing an audit is a legitimate, valuable signal to customers and partners. The failure mode isn’t compliance itself. It’s treating the audit as the finish line instead of a snapshot, and optimizing for what an auditor will check rather than what an attacker will actually exploit.' },
      { type: 'p', text: 'This shows up in specific, recognizable patterns: a password policy document that exists, gets reviewed once a year for the audit, and describes rules nobody enforces day to day. A list of "approved vendors" that’s accurate on the date it was submitted and drifts within weeks as new SaaS tools get adopted without going through the process. An access review that happens once, right before the audit window, rather than continuously — so an employee who changed roles eight months ago and never lost their old system access sails through, because the review only looks at the moment it runs, not the months surrounding it.' },
      { type: 'p', text: 'None of this is fraud, exactly. It’s a rational response to an incentive structure that rewards passing the audit and rarely measures anything else. The fix is treating compliance as the floor, not the ceiling — building controls that would hold up under continuous, unannounced scrutiny, not just the specific week the auditor is looking. If a control only works when everyone knows it’s being checked, it isn’t a control. It’s a performance.' },
      { type: 'h3', text: 'Metrics That Lie' },
      { type: 'p', text: 'Ask a lot of security teams how the program is doing and you’ll hear numbers that sound reassuring and measure almost nothing that matters: phishing simulation click rates trending down, percentage of endpoints "covered" by EDR, number of vulnerabilities "remediated" this quarter, security awareness training completion rate. Every one of these can improve steadily for years while the organization’s actual exposure to a real attacker gets worse, because they measure activity and compliance with a process, not outcomes.' },
      { type: 'p', text: 'A falling phishing click rate can simply mean employees have learned to recognize your specific simulated phishing template, not that they’d catch a genuinely well-crafted attack. A high vulnerability "remediation" count can mean a team is closing out the easy, low-severity findings while the handful of critical ones linger because they require a harder conversation with a business owner about downtime. The metrics aren’t dishonest, exactly — they’re just measuring what’s easy to measure instead of what’s hard to measure and actually matters, which is a distinction that becomes a real vulnerability once leadership starts making resourcing decisions based on a dashboard trending in the right direction for the wrong reasons.' },
      { type: 'p', text: 'The corrective isn’t abandoning metrics — it’s pairing every activity metric with at least one outcome-oriented check on it: not just "did people complete the training" but a periodic, unannounced simulated phish using a novel pretext, not just "endpoints covered" but a random sample audit confirming those agents are actually reporting and current. A metric nobody has tried to falsify or game yet is usually just a metric nobody has relied on for anything important — the moment it matters, treat it with the same skepticism you’d bring to a vendor’s marketing claim.' },
      { type: 'h3', text: 'The Policy-Practice Gap' },
      { type: 'p', text: 'Every company with a security program has a folder of policy documents: acceptable use, data classification, incident response, vendor management. The gap that gets companies breached isn’t the absence of these documents — it’s the distance between what they say and what actually happens when someone is trying to hit a deadline, close a deal, or fix a production issue at 11 p.m.' },
      { type: 'p', text: 'A policy that says "all new vendors must go through security review" means nothing if a sales director can sign up for a new tool with a company credit card in ten minutes and nobody ever finds out. A policy that says "service account passwords rotate every ninety days" means nothing if the rotation is manual, unowned, and skipped whenever the person who used to do it changes teams — which is precisely how the two-year-old service account password in this series’ breach timeline stayed valid long enough to matter.' },
      { type: 'p', text: 'Closing this gap isn’t about writing better policy language — most policy documents are already reasonable on paper. It’s about building the practice to match: automating what can be automated so compliance doesn’t depend on someone remembering, making the secure path the easy path so people don’t have a reason to route around it, and periodically testing whether the policy is actually happening rather than just assuming a document equals a behavior.' },
      { type: 'h3', text: 'Building a Culture People Don’t Secretly Hate' },
      { type: 'p', text: 'The last failure mode is the most human, and arguably the most consequential: a security culture built on fear, blame, and "gotcha" moments trains employees to hide mistakes rather than report them. The phishing simulation that publicly shames whoever clicked. The security team that treats every question as an interrogation. The incident postmortem that becomes a hunt for who to blame instead of what to fix. Each of these teaches a lesson, just not the intended one — the lesson learned is "don’t tell security anything, ever, if you can avoid it."' },
      { type: 'p', text: 'That lesson is catastrophic in exactly the moments security depends most on people speaking up. An employee who clicks a phishing link and immediately reports it gives the security team a chance to respond within minutes. An employee who clicks the same link, in a culture that punishes admitting it, sits on that knowledge out of fear — sometimes for hours, sometimes for days, sometimes forever — turning a fast, containable incident into the kind of multi-day breach walked through elsewhere in this series.' },
      { type: 'p', text: 'The alternative isn’t lowering standards. It’s making the desired behavior — reporting fast, asking questions, admitting uncertainty — the path of least resistance and social safety, rather than the path that invites punishment. Security teams that get this right talk about "we caught it because someone told us right away," not "we caught the person who clicked." That’s not a soft distinction. It’s the difference between a culture that produces fast signal and one that produces silence.' },
      { type: 'h3', text: 'The Common Thread' },
      { type: 'p', text: 'Alert fatigue, security shelf-ware, compliance theater, metrics that lie, the policy-practice gap, and punitive culture look like six unrelated problems, but they share the same underlying shape: each one is a system that looks functional from the outside — alerts are firing, the audit was passed, the policy exists, the phishing simulation program is running — while quietly failing to produce the actual outcome it exists for. None of them show up as a missing line item on a security budget. All of them show up, eventually, as a breach that makes everyone ask how a "good" program let this happen.' },
      { type: 'p', text: 'The honest answer, most of the time, is that the program wasn’t bad. It was optimized for looking secure — passing the audit, generating the alert, publishing the policy, running the simulation — rather than for the harder, less measurable work of being secure under real conditions, with real people, on an ordinary Tuesday when nobody’s watching especially closely. That’s the gap worth closing, and unlike most security problems, it doesn’t require a bigger budget to start closing it. It requires being honest about which of your controls are real and which ones are theater.' },
    ],
  },
  'building-an-ir-plan': {
    index: '04',
    title: 'Building an Incident Response Plan From Scratch, In a Weekend',
    subtitle: 'A step-by-step, genuinely usable guide for the IT pro who’s been told to "have a plan" and given no budget, no headcount, and no template.',
    readTime: 11,
    domains: ['Domain 2 — Detection & Response', 'Domain 4 — Practical Defense & Career'],
    takeaways: [
      'A usable, five-page incident response plan built this weekend beats a comprehensive, unread plan that exists only because a template said it should.',
      'The single highest-value section of any IR plan is the contact tree — who gets called, in what order, and who has authority to make containment decisions at 2 a.m.',
      'Preserve evidence before you clean up — the instinct to wipe and reimage immediately destroys the forensic trail you’ll need for insurance, legal, and root cause.',
      'A plan that’s never been tabletopped is a theory. Running a 90-minute tabletop against your own plan the same weekend you write it is how you find the holes before an attacker does.',
      'This plan is a living document, not a deliverable — the version you write this weekend should look meaningfully different a year from now.',
    ],
    blocks: [
      { type: 'p', text: 'At some point, someone — an auditor, a cyber insurance application, a new manager, your own conscience at 11 p.m. after reading one too many breach postmortems — is going to ask whether you have an incident response plan. If you’re at a company with six IT staff and no dedicated security hire, the honest answer is usually no, and the reason isn’t laziness. It’s that every IR plan template you’ve found online is forty pages long, written for a company with a security operations center, and about as usable in an actual 2 a.m. crisis as a phone book.' },
      { type: 'p', text: 'This is a different approach: build something real, scoped to the team you actually have, over one weekend. Not a compliance artifact. A plan you could genuinely follow while your hands are shaking and your CEO is calling every fifteen minutes. A handful of sections, each buildable in a few focused hours, tabletopped before Monday so you know where it breaks.' },
      { type: 'h3', text: 'Before You Start: What This Plan Is Not' },
      { type: 'p', text: 'It’s not a substitute for cyber insurance or an incident response retainer — if you don’t have either, this weekend is also a good time to start that conversation with leadership, because both take time to set up and are far more expensive to acquire mid-incident, if they’re even available at all by then. It’s not a document that needs executive sign-off before you can start using it informally — you can iterate on a working draft with your team long before it’s "official." And it’s not going to be complete. A five-page plan that your team has actually read and rehearsed beats a fifty-page plan that impressed an auditor once and has been sitting in a SharePoint folder ever since.' },
      { type: 'h3', text: 'Saturday Morning: Define What Counts as an Incident' },
      { type: 'p', text: 'Start here, because without it, every later decision stalls on a definitional argument at the worst possible time. Write down three or four severity tiers in plain language — not a formal scoring matrix, just enough shared understanding that two people looking at the same situation reach the same conclusion about how seriously to treat it. Something like: Tier 1 is a single compromised account with no evidence of lateral movement. Tier 2 is confirmed unauthorized access to a server or system with sensitive data. Tier 3 is active ransomware, confirmed data exfiltration, or anything touching customer data at scale. Tier 4 is "we genuinely don’t know the scope yet and need to assume the worst until proven otherwise."' },
      { type: 'p', text: 'For each tier, write one sentence on who gets notified and how fast. Tier 1 might be "IT lead notified within the hour, no executive call needed yet." Tier 4 should be "everyone on the contact tree, immediately, no exceptions." The value of doing this in advance is that in the actual moment, nobody has to debate whether this is "bad enough" to wake someone up — the plan already answered that question when everyone was calm.' },
      { type: 'h3', text: 'Saturday Midday: Build the Contact Tree' },
      { type: 'p', text: 'This is the single highest-value section of the entire plan, and the one most templates bury on page thirty instead of leading with. Build a simple list: name, role, phone number (not just email — a compromised email account is a bad place to coordinate an email compromise response), and what decision they’re authorized to make. Who can authorize disconnecting a server from the network? Who can authorize paying for an emergency incident response firm without waiting for a normal procurement cycle? Who talks to customers, and who talks to press, if it comes to that — and critically, who is explicitly not authorized to do either, so a well-meaning employee doesn’t post something on social media that creates a legal problem?' },
      { type: 'p', text: 'Include your outside resources here too: your incident response retainer firm if you have one, your cyber insurance carrier’s incident hotline, outside legal counsel if you have a relationship, and law enforcement contact information if applicable to your industry. Print this page. Put a copy somewhere that doesn’t depend on the very systems that might be down or compromised during the incident — a compromised email account can’t retrieve the contact list stored only in that email account.' },
      { type: 'h3', text: 'Saturday Afternoon: Write the First 60 Minutes Playbook' },
      { type: 'p', text: 'This section answers the question that paralyzes people most: what do I actually do in the first hour, before the incident response firm picks up the phone? Keep it to concrete, ordered actions. Something close to: confirm the report with a second person before acting, to avoid a costly overreaction to a false alarm. Isolate the affected system from the network — pull the cable or disable the network adapter, don’t power it off, since powering off can destroy forensic evidence in memory that a clean shutdown or unplug preserves. Do not reimage, do not "just clean it up," and do not run additional software on the affected system until someone has decided whether forensic preservation matters for this incident — you can’t undo a wipe.' },
      { type: 'quote', text: 'The instinct to immediately clean up and move on is the single most common way a recoverable incident becomes an unexplainable one.' },
      { type: 'p', text: 'Add a line about preserving logs specifically — many logging systems only retain a limited window, and if nobody thinks to export or extend retention on relevant logs in the first hour, that evidence can age out before an investigator ever gets to look at it. Close this section with who makes the call to escalate to the next severity tier, so the plan doesn’t stall waiting for permission that was never clearly assigned.' },
      { type: 'h3', text: 'Saturday Evening: Draft Communication Templates' },
      { type: 'p', text: 'Nobody writes well under pressure, and an incident is exactly the wrong time to compose your first-ever breach notification email from a blank page. Draft rough templates now, while you’re calm: an internal all-staff notice for "we’re investigating a security issue, here’s what we need from you" — usually don’t discuss company IT issues externally, don’t click unusual links, expect delays. A customer-facing holding statement for if disclosure becomes necessary, kept honest and light on speculation. A rough outline of what a regulatory notification might need to include, even if you plan to have legal counsel finalize the actual language — knowing the shape of what’s required (what happened, what data was involved, what you’re doing about it, timeline) saves real time later.' },
      { type: 'p', text: 'These don’t need to be polished. They need to exist as a starting point so that a stressed, tired team is editing a draft instead of staring at a blank document while the clock on regulatory notification deadlines is already running.' },
      { type: 'h3', text: 'Sunday Morning: Map Your Recovery Priorities' },
      { type: 'p', text: 'Before you can respond well, you need to know what actually matters most if multiple systems are down simultaneously. List your critical systems — the ERP, email, the production application, whatever runs the business — and rank them by how long the company can tolerate them being unavailable. You don’t need formal RTO and RPO numbers from a disaster recovery consultant; a rough gut-check ranking, written down and agreed on by whoever runs the business, beats improvising that ranking mid-incident while three departments each insist their system is the most critical one.' },
      { type: 'p', text: 'For each critical system, note where its backup lives, how it’s restored, and — critically, given how often this specific gap causes trouble — whether that backup is reachable from the same network and credentials as the production system it’s backing up. If the answer is yes, that’s not a Sunday-morning fix, but it’s worth flagging clearly in the plan as a known risk to address, rather than discovering it silently during an actual ransomware event.' },
      { type: 'h3', text: 'Sunday Afternoon: Tabletop It, Immediately' },
      { type: 'p', text: 'Don’t let this plan sit untested until a real incident finds its gaps for you. Block ninety minutes with whoever would actually be involved, and walk through a single realistic scenario using the plan you just wrote — someone reports a phishing email, and a linked account shows signs of unusual activity. Follow your own severity tiers, your own contact tree, your own first-hour playbook, out loud, as if it were real. Someone should play devil’s advocate: what if the person you listed as the decision-maker is on a plane? What if the incident happens at 3 a.m. on a Saturday, not during business hours when this tabletop is running?' },
      { type: 'p', text: 'You will find holes. That’s the entire point, and it’s far better to find them in a conference room on a Sunday afternoon than during an actual incident three months from now. Write down every gap the tabletop surfaces, and treat closing them as this plan’s first revision — due not in a year, but within a couple of weeks, while the lessons are still fresh.' },
      { type: 'h3', text: 'Sunday Evening: Get It Endorsed, Not Just Written' },
      { type: 'p', text: 'A plan built entirely by IT, with no visibility from leadership, has one specific failure mode: at the moment it matters most, someone with real authority who’s never seen the document starts questioning or overriding it in real time. Before Monday, send a short summary — not the full plan, a one-page version — to whoever you listed as having ultimate decision authority, framed as "this is what we’ll follow if something happens; flag anything you disagree with." You’re not asking permission to have a plan. You’re making sure the person the plan names as the decision-maker actually knows they’re in it, and agrees with the authority it assumes they have.' },
      { type: 'p', text: 'This step catches problems a tabletop alone won’t. Maybe the person you assumed could authorize an emergency IR firm engagement actually needs board sign-off above a certain dollar amount — better to learn that Sunday evening than mid-incident. Maybe legal wants to be looped in earlier than you assumed, given specific regulatory obligations your industry carries that you weren’t fully aware of. A plan that’s technically complete but organizationally unendorsed is still a plan that will stall on authority questions at the worst possible moment — the exact failure this whole weekend was meant to prevent.' },
      { type: 'h3', text: 'Common First-Draft Mistakes' },
      { type: 'p', text: 'A few patterns show up reliably in first-pass plans built this way, worth checking your own draft against before Monday. The contact tree lists only one name per role, with no backup for when that person is on vacation, on a plane, or simply unreachable — always list a primary and at least one alternate for every critical decision point. The severity tiers are defined crisply but the plan never says who’s responsible for making the initial call on which tier an incident falls into, leaving that judgment call to whoever happens to notice first, under pressure, with no guidance.' },
      { type: 'p', text: 'Another common gap: the plan assumes normal business hours and normal access to normal systems, with no version of the instructions for "this happened at 2 a.m. and the person who’d normally handle it is unreachable" or "the compromised system is the one we’d normally use to look up this very plan." Store a copy somewhere accessible without relying on the systems the plan exists to help you recover — a printed copy in a physical folder, or a document in a personal, non-corporate account, sounds low-tech, but low-tech is exactly what survives when the high-tech systems are the ones in question.' },
      { type: 'h3', text: 'What Happens After the Weekend' },
      { type: 'p', text: 'You now have something most companies your size don’t: a plan that’s actually been read, actually been rehearsed, and actually reflects the team and systems you have — not a generic template describing a security operations center you don’t staff. It won’t cover everything. It doesn’t need to. What it needs to do is remove the two things that turn a bad day into a catastrophic one: uncertainty about who decides what, and precious hours lost improvising communication and containment steps that could have been thought through in advance.' },
      { type: 'p', text: 'Put a recurring reminder on the calendar — quarterly is reasonable — to revisit this plan: update the contact tree when people leave, re-rank recovery priorities as systems change, and rerun a tabletop with a different scenario each time so the team doesn’t just memorize one specific story. A plan that hasn’t changed in eighteen months isn’t a mature plan. It’s a plan that stopped being maintained the same weekend it was written — and the whole point of doing this in a weekend instead of never was to make sure that isn’t the version you’re stuck with when it actually matters.' },
    ],
  },
};

class Component extends DCLogic {
  state = { piece: 'anatomy-of-a-breach', paletteOverride: null };

  componentDidMount() {
    const params = new URLSearchParams(window.location.search);
    const requested = params.get('piece');
    const piece = DEEP_DIVES_DATA[requested] ? requested : 'anatomy-of-a-breach';
    this.setState({ piece });

    const savedName = localStorage.getItem('cg-palette-name');
    const found = savedName && CG_PALETTES.find(p => p.name === savedName);
    if (found) this.setState({ paletteOverride: found.colors }, () => this.applyPalette());
    else this.applyPalette();
  }
  componentDidUpdate(prevProps) {
    if (prevProps.palette !== this.props.palette) this.applyPalette();
  }
  getActivePalette() {
    return this.state.paletteOverride ?? this.props.palette ?? CG_DEFAULT_PALETTE;
  }
  applyPalette() {
    const p = this.getActivePalette();
    CG_VARS.forEach((v, i) => document.documentElement.style.setProperty(v, p[i]));
  }

  renderVals() {
    const activePalette = this.getActivePalette();
    const swatches = CG_PALETTES.map(pal => ({
      name: pal.name,
      gradient: `linear-gradient(135deg, ${pal.colors[3]} 50%, ${pal.colors[0]} 50%)`,
      ringColor: activePalette[3] === pal.colors[3] ? activePalette[5] : 'transparent',
      select: () => { localStorage.setItem('cg-palette-name', pal.name); this.setState({ paletteOverride: pal.colors }, () => this.applyPalette()); },
    }));

    const piece = DEEP_DIVES_DATA[this.state.piece];
    const blocks = piece.blocks.map(b => ({
      text: b.text,
      isHeading: b.type === 'h3',
      isQuote: b.type === 'quote',
      isParagraph: b.type === 'p',
    }));

    return {
      swatches,
      pieceIndex: piece.index,
      pieceTitle: piece.title,
      pieceSubtitle: piece.subtitle,
      pieceReadTime: piece.readTime,
      pieceDomains: piece.domains,
      pieceTakeaways: piece.takeaways,
      blocks,
    };
  }
}
</script>
</body>
</html>
